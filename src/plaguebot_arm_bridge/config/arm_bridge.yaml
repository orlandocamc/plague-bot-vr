arm_bridge:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    reconnect_attempts: 5
    reconnect_delay_sec: 2.0
    interpolation_hz: 20
    publish_joint_states: false

    joint_to_channel:
      joint_1: 6
      joint_2: 3
      joint_3: 4
      joint_4: 2
      joint_5: 1
      joint_6: 0

    mirrored_joints:
      joint_3:
        mirror_channel: 5
        mirror_inverted: true

    joint_limits:
      joint_1: [-1.5708, 1.5708]
      joint_2: [-1.5708, 1.5708]
      joint_3: [-1.5708, 1.5708]
      joint_4: [-1.5708, 1.5708]
      joint_5: [-1.5708, 1.5708]
      joint_6: [-1.5708, 1.5708]

    joint_offsets_deg:
      joint_1: 0.0
      joint_2: 0.0
      joint_3: 0.0
      joint_4: 0.0
      joint_5: 0.0
      joint_6: 0.0

    joint_inverted:
      joint_1: false
      joint_2: false
      joint_3: false
      joint_4: false
      joint_5: false
      joint_6: false
