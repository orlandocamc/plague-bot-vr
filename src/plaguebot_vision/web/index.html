<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlagueBot Vision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; color: #7ecfff; margin-bottom: 1rem; }
    #status { font-size: 0.75rem; letter-spacing: 0.15em; color: #555; margin-bottom: 0.75rem; }
    #status.connected { color: #4caf7d; }
    #status.error { color: #cf6679; }
    #video-wrapper { position: relative; width: min(96vw, calc(96vh * 16 / 9)); aspect-ratio: 16/9; background: #111118; border: 1px solid #1e1e2e; border-radius: 6px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(10,10,15,0.7); color: #444; font-size: 0.85rem; }
    #overlay.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <h1>PlagueBot Vision</h1>
  <div id="status">Connecting...</div>
  <div id="video-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay">Waiting for stream...</div>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const overlayEl = document.getElementById('overlay');
    const videoEl = document.getElementById('video');

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
    }

    async function start() {
      const ws = new WebSocket(`ws://${location.hostname}:8080/ws`);
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

      pc.onicecandidate = ({ candidate }) => {
        if (candidate && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'candidate', candidate: candidate.candidate, sdpMid: candidate.sdpMid, sdpMLineIndex: candidate.sdpMLineIndex }));
      };

      pc.onconnectionstatechange = () => {
        const s = pc.connectionState;
        if (s === 'connected') { setStatus('Connected', 'connected'); overlayEl.classList.add('hidden'); }
        else if (['failed','disconnected','closed'].includes(s)) { setStatus(`Connection ${s}`, 'error'); overlayEl.classList.remove('hidden'); }
      };

      pc.ontrack = ({ track, streams }) => { if (track.kind === 'video' && streams[0]) videoEl.srcObject = streams[0]; };

      ws.onopen = async () => {
        setStatus('Creating offer...');
        pc.addTransceiver('video', { direction: 'recvonly' });
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
      };

      ws.onmessage = async ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'answer') { await pc.setRemoteDescription(new RTCSessionDescription(msg)); setStatus('Negotiating...'); }
        else if (msg.type === 'candidate' && msg.candidate) await pc.addIceCandidate(new RTCIceCandidate({ candidate: msg.candidate, sdpMid: msg.sdpMid, sdpMLineIndex: msg.sdpMLineIndex }));
      };

      ws.onerror = () => setStatus('WebSocket error', 'error');
      ws.onclose = () => { setStatus('Disconnected - retrying in 3s...', 'error'); setTimeout(start, 3000); };
    }

    start();
  </script>
</body>
</html>
